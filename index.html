<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>سنتي - تذكر كل شيء</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <!-- التنسيقات الخاصة -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-container">
    <div class="header">
        <h1><i class="fas fa-bell"></i> سنتي · تذكير بكل شيء</h1>
        <div class="sub"><i class="fas fa-check-circle"></i> نظم مهامك، حدد الأولويات، ولا تنسَ شيئاً أبداً</div>
    </div>

    <div class="dashboard">
        <!-- قسم إضافة مهمة جديدة -->
        <div class="add-section">
            <div class="card-title">
                <i class="fas fa-plus-circle" style="color:#ffb347"></i> 
                <span>أضف تذكيراً جديداً</span>
            </div>
            <form id="taskForm">
                <div class="form-group">
                    <label><i class="fas fa-heading"></i> العنوان *</label>
                    <input type="text" id="taskTitle" placeholder="مثال: اجتماع مهم, شراء هدية, موعد طبيب" required maxlength="100">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-align-left"></i> تفاصيل إضافية</label>
                    <textarea id="taskDesc" rows="2" placeholder="وصف أو ملاحظات ..."></textarea>
                </div>
                <div class="form-group">
                    <label><i class="far fa-calendar-alt"></i> التاريخ والوقت</label>
                    <input type="datetime-local" id="taskDatetime">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-flag"></i> الفئة</label>
                    <select id="taskCategory">
                        <option value="عام">📌 عام</option>
                        <option value="عمل">💼 عمل</option>
                        <option value="شخصي">❤️ شخصي</option>
                        <option value="صحة">🍏 صحة</option>
                        <option value="تعليم">📚 تعليم</option>
                    </select>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-chart-line"></i> الأولوية</label>
                    <div class="priority-buttons">
                        <div data-prio="منخفضة" class="priority-btn priority-low">🟢 منخفضة</div>
                        <div data-prio="متوسطة" class="priority-btn priority-medium active">🟠 متوسطة</div>
                        <div data-prio="عالية" class="priority-btn priority-high">🔴 عالية</div>
                    </div>
                    <input type="hidden" id="taskPriority" value="متوسطة">
                </div>
                <button type="submit" class="btn-submit"><i class="fas fa-save"></i> أضف التذكير</button>
            </form>
        </div>

        <!-- عرض المهام والخدمات المستقبلية -->
        <div class="tasks-section">
            <div class="tasks-header">
                <div class="card-title" style="margin-bottom:0;">
                    <i class="fas fa-list-check"></i> تذكيراتي
                </div>
                <div class="filter-bar">
                    <button data-filter="all" class="filter-btn active-filter">الكل</button>
                    <button data-filter="نشطة" class="filter-btn">نشطة</button>
                    <button data-filter="مكتملة" class="filter-btn">مكتملة</button>
                </div>
            </div>
            <div class="tasks-list" id="tasksListContainer">
                <!-- سيتم عرض المهام ديناميكياً -->
                <div class="empty-msg">✨ لا توجد تذكيرات، أضف تذكيراً جديداً!</div>
            </div>

            <!-- جزء الخدمات المستقبلية (قابل للتوسع) -->
            <div class="future-services">
                <p><i class="fas fa-microphone-alt"></i> خدمات قادمة في سنتي:</p>
                <span>📢 تنبيهات صوتية</span>
                <span>☁️ مزامنة سحابية</span>
                <span>📅 تقويم ذكي</span>
                <span>🤖 مساعد يومي</span>
                <span><i class="fas fa-plus-circle"></i> المزيد قريباً...</span>
            </div>
        </div>
    </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
